{% extends "TrackZen/base.html" %}
{% block title %}My Feedback{% endblock %}

{% block content %}
<div class="dashboard-container">
    <h3>My Feedback</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Message</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for fb in my_feedbacks %}
        <tr>
            <td>{{ fb.message }}</td>
            <td>{{ fb.created_at|date:"d M Y H:i" }}</td>
            <td>
                <form method="post" style="display:inline;">
                    {% csrf_token %}
                    <input type="hidden" name="delete_feedback" value="{{ fb.id }}">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="3">No feedback yet.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
</div>
{% endblock %}
