<div class="card">
    <h3>Task History (Last 7 Days)</h3>

    {% for date, tasks in tasks_by_date.items %}
    <h4>{{ date }}</h4>
    <table>
        <tr><th>Task</th><th>Status</th></tr>
        {% for task in tasks %}
        <tr>
            <td>{{ task.task_name }}</td>
            <td>{% if task.is_completed %}Completed{% else %}Pending{% endif %}</td>
        </tr>
        {% empty %}
        <tr><td colspan="2">No tasks for this day.</td></tr>
        {% endfor %}
    </table>
    {% endfor %}
</div>
